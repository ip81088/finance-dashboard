apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-dashboard
  namespace: finance
  labels:
    app: finance-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: finance-dashboard
  template:
    metadata:
      labels:
        app: finance-dashboard
    spec:
      containers:
        - name: finance-dashboard
          image: finance-dashboard:v25
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_PATH
              value: /data/sqlite.db
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/accounts
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/accounts
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: finance-data
